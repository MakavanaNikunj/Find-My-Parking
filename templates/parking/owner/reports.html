<!DOCTYPE html>
<html>
<head>

<title>Parking Reports</title>

<style>

body{
background:#070d18;
font-family:Segoe UI;
color:white;
padding:40px;
}

/* header */

.header{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:30px;
}

.header h2{
color:#f5c84c;
}

/* cards */

.cards{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:20px;
margin-bottom:30px;
}

.card-box{
background:#0b1220;
padding:25px;
border-radius:14px;
}

.card-title{
color:#9ca3af;
font-size:14px;
margin-bottom:10px;
}

.card-value{
font-size:28px;
font-weight:bold;
color:#4cff8f;
}

/* table */

.card{
background:#0b1220;
padding:25px;
border-radius:14px;
}

table{
width:100%;
border-collapse:collapse;
}

th{
text-align:left;
padding:12px;
color:#9ca3af;
border-bottom:1px solid rgba(255,255,255,0.1);
}

td{
padding:12px;
border-bottom:1px solid rgba(255,255,255,0.05);
}

.revenue{
color:#4cff8f;
font-weight:bold;
}

</style>

</head>

<body>


<div class="header">

<h2>Parking Reports</h2>

</div>


<!-- summary cards -->

<div class="cards">

<div class="card-box">
<div class="card-title">Total Bookings</div>
<div class="card-value">{{bookings}}</div>
</div>

<div class="card-box">
<div class="card-title">Total Revenue</div>
<div class="card-value">₹{{revenue}}</div>
</div>

<div class="card-box">
<div class="card-title">Active Parking Slots</div>
<div class="card-value">{{slots}}</div>
</div>

</div>


<!-- reports table -->

<div class="card">

<table>

<tr>
<th>Date</th>
<th>Total Bookings</th>
<th>Revenue</th>
</tr>

{% for r in reports %}

<tr>

<td>{{r.date}}</td>
<td>{{r.bookings}}</td>
<td class="revenue">₹{{r.revenue}}</td>

</tr>

{% endfor %}

</table>

</div>


</body>
</html>
