{% load static %}
<!DOCTYPE html>
<html>
<head>
<title>Add Slot</title>
<style>
body { background:#070d18; font-family:Segoe UI; color:white; padding:40px; padding-top:102px; }
.topbar {
  position:fixed; top:0; left:0; right:0; height:62px;
  background:#0b1018; border-bottom:1px solid rgba(212,175,55,0.10);
  display:flex; align-items:center; padding:0 26px; gap:14px; z-index:100;
}
.hamburger {
  width:38px; height:38px; border-radius:8px;
  border:1px solid rgba(212,175,55,0.10); background:#101620;
  color:#f0cc6a; font-size:18px; cursor:pointer;
  display:flex; align-items:center; justify-content:center;
}
.tb-right { margin-left:auto; display:flex; align-items:center; gap:10px; }
.header h2 { color:#f5c84c; margin-bottom:24px; }
.card { background:#0b1220; padding:30px; border-radius:14px; max-width:540px; }
.form-group { margin-bottom:18px; }
label { display:block; margin-bottom:6px; color:#9ca3af; font-size:13px; }
input, select {
  width:100%; padding:10px 14px; border-radius:8px;
  border:1px solid rgba(212,175,55,0.15);
  background:#070d18; color:white;
  font-family:Segoe UI; font-size:13px; outline:none; box-sizing:border-box;
}
input:focus, select:focus { border-color:rgba(212,175,55,0.40); }
select option { background:#0b1220; }
.btn-save {
  background:linear-gradient(135deg,#f0cc6a,#d4af37); color:#080400;
  font-weight:800; font-size:13px; padding:10px 24px;
  border-radius:8px; border:none; cursor:pointer; margin-right:10px;
}
.btn-cancel {
  background:#1c2534; color:#9ca3af; font-size:13px; padding:10px 20px;
  border-radius:8px; border:1px solid rgba(255,255,255,0.1);
  cursor:pointer; text-decoration:none; display:inline-block;
}
</style>
</head>
<body>
<div class="topbar">
  <button id="menuToggle" class="hamburger">☰</button>
  <div class="tb-right">
    <span style="color:#8496ab;font-size:13px">{{ request.user.email }}</span>
  </div>
</div>

{% include 'parking/owner/ownersidebar.html' %}

<div class="header"><h2>Add Slot</h2></div>
<div class="card">
  <form method="POST">
    {% csrf_token %}
    <div class="form-group">
      <label>Parking Area</label>
      <select name="parking" required>
        <option value="">-- Select Parking --</option>
        {% for p in parkings %}
          <option value="{{ p.id }}">{{ p.name }}</option>
        {% endfor %}
      </select>
    </div>
    <div class="form-group">
      <label>Slot Number</label>
      <input type="text" name="slot_number" placeholder="e.g. A-01" required>
    </div>
    <div class="form-group">
      <label>Status</label>
      <select name="status">
        <option value="available">Available</option>
        <option value="occupied">closed</option>
      </select>
    </div>
    <div style="margin-top:24px;">
      <button type="submit" class="btn-save">＋ Add Slot</button>
      <a href="{% url 'parking:manage_slots' %}" class="btn-cancel">Cancel</a>
    </div>
  </form>
</div>
</body>
</html>
