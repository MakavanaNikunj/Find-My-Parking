<!DOCTYPE html>
<html>
<head>

<title>Parking Bookings</title>

<style>

body{
background:#070d18;
font-family:Segoe UI;
color:white;
padding:40px;
}

/* header */

.header{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:30px;
}

.header h2{
color:#f5c84c;
}

/* card */

.card{
background:#0b1220;
padding:25px;
border-radius:14px;
}

/* table */

table{
width:100%;
border-collapse:collapse;
}

th{
text-align:left;
padding:12px;
color:#9ca3af;
border-bottom:1px solid rgba(255,255,255,0.1);
}

td{
padding:12px;
border-bottom:1px solid rgba(255,255,255,0.05);
}

/* status */

.active{
background:#0f5132;
color:#4cff8f;
padding:4px 10px;
border-radius:6px;
font-size:12px;
}

.pending{
background:#5a3c00;
color:#ffcc00;
padding:4px 10px;
border-radius:6px;
font-size:12px;
}

.completed{
background:#1e3a8a;
color:#60a5fa;
padding:4px 10px;
border-radius:6px;
font-size:12px;
}

/* buttons */

.view{
background:#2563eb;
padding:6px 10px;
border-radius:6px;
color:white;
text-decoration:none;
margin-right:6px;
}

.delete{
background:#dc2626;
padding:6px 10px;
border-radius:6px;
color:white;
text-decoration:none;
}

</style>

</head>

<body>


<div class="header">

<h2>Parking Bookings</h2>

</div>


<div class="card">

<table>

<tr>
<th>Vehicle Number</th>
<th>User</th>
<th>Slot</th>
<th>Time</th>
<th>Status</th>
<th>Action</th>
</tr>


{% for b in bookings %}

<tr>

<td>{{b.vehicle}}</td>
<td>{{b.user}}</td>
<td>{{b.slot}}</td>
<td>{{b.time}}</td>

<td>

{% if b.status == "Active" %}
<span class="active">Active</span>

{% elif b.status == "Pending" %}
<span class="pending">Pending</span>

{% else %}
<span class="completed">Completed</span>

{% endif %}

</td>

<td>

<a href="#" class="view">View</a>
<a href="#" class="delete">Delete</a>

</td>

</tr>

{% endfor %}

</table>

</div>


</body>
</html>
