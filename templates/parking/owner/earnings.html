<!DOCTYPE html>
<html>
<head>

<title>Earnings</title>

<style>

body{
background:#070d18;
font-family:Segoe UI;
color:white;
padding:40px;
}

/* header */

.header{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:30px;
}

.header h2{
color:#f5c84c;
}

/* cards */

.cards{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:20px;
margin-bottom:30px;
}

.card-box{
background:#0b1220;
padding:25px;
border-radius:14px;
}

.card-title{
color:#9ca3af;
font-size:14px;
margin-bottom:10px;
}

.card-value{
font-size:28px;
font-weight:bold;
color:#4cff8f;
}

/* table card */

.card{
background:#0b1220;
padding:25px;
border-radius:14px;
}

/* table */

table{
width:100%;
border-collapse:collapse;
}

th{
text-align:left;
padding:12px;
color:#9ca3af;
border-bottom:1px solid rgba(255,255,255,0.1);
}

td{
padding:12px;
border-bottom:1px solid rgba(255,255,255,0.05);
}

.amount{
color:#4cff8f;
font-weight:bold;
}

</style>

</head>

<body>


<div class="header">

<h2>Earnings Dashboard</h2>

</div>


<!-- earnings cards -->

<div class="cards">

<div class="card-box">
<div class="card-title">Total Earnings</div>
<div class="card-value">₹{{total}}</div>
</div>

<div class="card-box">
<div class="card-title">Today's Earnings</div>
<div class="card-value">₹{{today}}</div>
</div>

<div class="card-box">
<div class="card-title">Weekly Earnings</div>
<div class="card-value">₹{{week}}</div>
</div>

</div>


<!-- earnings table -->

<div class="card">

<table>

<tr>
<th>Date</th>
<th>Parking Area</th>
<th>Earnings</th>
</tr>

{% for e in earnings %}

<tr>

<td>{{e.date}}</td>
<td>{{e.parking}}</td>
<td class="amount">₹{{e.amount}}</td>

</tr>

{% endfor %}

</table>

</div>


</body>
</html>
