{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CarAdmin – {% block title %}Dashboard{% endblock %}</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600;700&family=Nunito:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg:        #06090f;
      --s1:        #0b1018;
      --s2:        #101620;
      --s3:        #161e2c;
      --s4:        #1d2738;
      --border:    rgba(212,175,55,0.10);
      --border2:   rgba(212,175,55,0.22);
      --border3:   rgba(212,175,55,0.40);
      --gold:      #d4af37;
      --gold2:     #f0cc6a;
      --gold3:     #b8942a;
      --gold-dim:  rgba(212,175,55,0.08);
      --text:      #e8dfc8;
      --text2:     #c4b896;
      --muted:     #5a6b80;
      --muted2:    #8496ab;
      --red:       #f87171;
      --sidebar-w: 252px;
      --font:      'Nunito', sans-serif;
      --display:   'Cormorant Garamond', serif;
    }

    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { height: 100%; }

    body {
      font-family: var(--font);
      background: var(--bg);
      color: var(--text);
      overflow-x: hidden;
    }

    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-thumb { background: var(--s4); border-radius: 4px; }
    ::-webkit-scrollbar-track { background: transparent; }

    /* ── TOPBAR ── */
    .topbar {
      height: 62px;
      background: var(--s1);
      border-bottom: 1px solid var(--border);
      display: flex; align-items: center;
      padding: 0 26px; gap: 14px;
      position: fixed; top: 0; left: 0; right: 0;
      z-index: 100;
    }

    .topbar::after {
      content: '';
      position: absolute; bottom: 0; left: 0; right: 0; height: 1px;
      background: linear-gradient(90deg, transparent, rgba(212,175,55,0.15), transparent);
    }

    /* Hamburger — lives in topbar */
    .hamburger {
      width: 38px; height: 38px;
      border-radius: 8px;
      border: 1px solid var(--border);
      background: var(--s2);
      color: var(--gold2);
      font-size: 18px;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: all .2s;
      flex-shrink: 0;
    }
    .hamburger:hover { border-color: var(--border3); background: var(--s3); }

    .search-box {
      display: flex; align-items: center; gap: 9px;
      background: var(--s2); border: 1px solid var(--border);
      border-radius: 10px; padding: 0 14px; height: 38px;
      transition: border-color .2s; flex: 1; max-width: 320px;
    }
    .search-box:focus-within { border-color: var(--border3); }
    .search-box input {
      background: none; border: none; outline: none;
      color: var(--text); font-size: 13px;
      font-family: var(--font); width: 100%;
    }
    .search-box input::placeholder { color: var(--muted); }

    .tb-right {
      margin-left: auto;
      display: flex; align-items: center; gap: 10px;
    }

    .tb-welcome {
      font-size: 12.5px; color: var(--muted2);
      background: var(--s2); border: 1px solid var(--border);
      padding: 6px 13px; border-radius: 8px;
    }
    .tb-welcome span { color: var(--gold2); font-weight: 600; }

    .tb-icon {
      width: 36px; height: 36px; border-radius: 9px;
      background: var(--s2); border: 1px solid var(--border);
      display: grid; place-items: center;
      font-size: 15px; cursor: pointer; position: relative;
      transition: border-color .18s;
    }
    .tb-icon:hover { border-color: var(--border3); }

    .tb-dot {
      width: 7px; height: 7px; background: var(--red);
      border-radius: 50%;
      position: absolute; top: 6px; right: 6px;
      border: 1.5px solid var(--s1);
      animation: dotPulse 2s ease infinite;
    }
    @keyframes dotPulse { 0%,100%{opacity:1} 50%{opacity:.4} }

    .add-btn {
      background: linear-gradient(135deg, var(--gold2), var(--gold), var(--gold3));
      color: #080400; font-family: var(--font);
      font-size: 13px; font-weight: 800;
      padding: 9px 20px; border-radius: 10px; border: none;
      cursor: pointer; display: flex; align-items: center; gap: 6px;
      box-shadow: 0 4px 18px rgba(212,175,55,0.4);
      transition: transform .15s, box-shadow .15s;
    }
    .add-btn:hover { transform: translateY(-1px); box-shadow: 0 6px 28px rgba(212,175,55,0.55); }

    /* ── PAGE BODY (below fixed topbar) ── */
    .page-body {
      padding-top: 62px; /* height of topbar */
      min-height: 100vh;
    }

    /* ── CONTENT AREA ── */
    .content {
      padding: 24px 26px;
      min-height: calc(100vh - 62px);
    }

  </style>
  {% block extra_css %}{% endblock %}
</head>
<body>

  <!-- ── FIXED TOPBAR (appears on every page) ── -->
  <div class="topbar">
    <!-- Hamburger button — opens sidebar -->
    <button id="menuToggle" class="hamburger" title="Open menu">☰</button>

    <div class="search-box">
      <span style="color:var(--muted);font-size:15px">⌕</span>
      <input type="text" placeholder="Search cars, users or logs…">
    </div>

    <div class="tb-right">
      <div class="tb-welcome">
        Welcome, <span>{{ request.user.email }}</span>
      </div>
      <div class="tb-icon">🔔<div class="tb-dot"></div></div>
      <div class="tb-icon">⚙</div>
      <button class="add-btn">＋ Add Parking</button>
    </div>
  </div>

  <!-- ── SIDEBAR (overlay, works on every page) ── -->
  {% include 'parking/owner/ownersidebar.html' %}

  <!-- ── PAGE CONTENT ── -->
  <div class="page-body">
    <div class="content">
      {% block content %}{% endblock %}
    </div>
  </div>

</body>
</html>
