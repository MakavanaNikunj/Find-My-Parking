{% load static %}

<!DOCTYPE html>
<html>
<head>
    <title>Book Slot</title>

    <style>
        body {
            background: #050d1f;
            font-family: Arial, sans-serif;
            color: white;
        }

        .container {
            max-width: 600px;
            margin: 80px auto;
        }

        .card {
            background: #0c1a2e;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
        }

        h2 {
            color: #ffc107;
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-top: 15px;
            margin-bottom: 5px;
            color: #ccc;
        }

        input, select {
            width: 100%;
            padding: 10px;
            border-radius: 8px;
            border: none;
            outline: none;
            background: #13253f;
            color: white;
        }

        input:focus {
            border: 1px solid #ffc107;
        }

        .btn {
            margin-top: 20px;
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 8px;
            background: #ffc107;
            color: black;
            font-weight: bold;
            cursor: pointer;
        }

        .btn:hover {
            background: #e0a800;
        }

        .parking-info {
            margin-bottom: 10px;
            color: #aaa;
        }

        .cost-box {
            margin-top: 15px;
            padding: 10px;
            background: #0f2a20;
            border-radius: 8px;
            color: #00ff99;
            font-weight: bold;
        }
    </style>
</head>

<body>

<div class="container">
    <div class="card">

        <h2>Book Slot - {{ parking.name }}</h2>

        <div class="parking-info">📍 {{ parking.location }}</div>
        <div class="parking-info">💰 ₹{{ parking.price_per_hour }}/hr</div>
        <div class="parking-info">🅿 Available: {{ parking.available_slots }}</div>

        <form id="booking-form">
            {% csrf_token %}

            <label>Slot Number</label>
            {{ form.slot_number }}

            <label>Start Time</label>
            <input type="datetime-local" id="start_time">

            <label>End Time</label>
            <input type="datetime-local" id="end_time">

            <div class="cost-box">
                Estimated Cost: <span id="estimated-cost">0</span>
            </div>

            <button type="button" id="pay-btn" class="btn">
                ✓ Confirm Booking
            </button>
        </form>

    </div>
</div>

<!-- Razorpay -->
<script src="https://checkout.razorpay.com/v1/checkout.js"></script>

<script>
const pricePerHour = {{ parking.price_per_hour }};

// 🔹 Auto calculate cost
function calculateCost() {
    let start = new Date(document.getElementById("start_time").value);
    let end = new Date(document.getElementById("end_time").value);

    if (start && end && end > start) {
        let hours = (end - start) / (1000 * 60 * 60);
        let cost = Math.round(hours * pricePerHour);
        document.getElementById("estimated-cost").innerText = cost;
    }
}

document.getElementById("start_time").addEventListener("change", calculateCost);
document.getElementById("end_time").addEventListener("change", calculateCost);


// 🔹 Payment Button
document.getElementById("pay-btn").onclick = function () {

    let amount = document.getElementById("estimated-cost").innerText;

    if (amount <= 0) {
        alert("Please select valid time");
        return;
    }

    fetch("/parking/create-order/", {
        method: "POST",
        headers: {
            "Content-Type": "application/x-www-form-urlencoded",
            "X-CSRFToken": "{{ csrf_token }}"
        },
        body: "amount=" + amount
    })
    .then(res => res.json())
    .then(data => {

        let options = {
            "key": data.key,
            "amount": data.amount,
            "currency": "INR",
            "name": "FindMyParking",
            "description": "Parking Booking",
            "order_id": data.order_id,

            handler: function (response) {

                fetch("/parking/confirm-booking/", {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/x-www-form-urlencoded",
                        "X-CSRFToken": "{{ csrf_token }}"
                    },
                    body:
                        "slot_id=" + document.getElementById("id_slot_number").value +
                        "&start_time=" + document.getElementById("start_time").value +
                        "&end_time=" + document.getElementById("end_time").value +
                        "&payment_id=" + response.razorpay_payment_id
                })
                .then(res => res.json())
                .then(result => {
                    if (result.status === "success") {
                        window.location.href = "/parking/my-bookings/";
                    }
                });

            }
        };

        let rzp = new Razorpay(options);
        rzp.open();

    });
};
</script>

</body>
</html>
