<!DOCTYPE html>
<html>
<head>

<title>Find Parking</title>

<style>

body{
background:#070d18;
font-family:Segoe UI;
color:white;
padding:40px;
}

/* header */

.header{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:30px;
}

.header h2{
color:#f5c84c;
}

/* search */

.search-box{
margin-bottom:30px;
}

.search-box input{
width:100%;
padding:12px;
border-radius:8px;
border:none;
background:#0b1220;
color:white;
}

/* parking grid */

.parking-grid{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:20px;
}

/* card */

.card{
background:#0b1220;
padding:20px;
border-radius:14px;
}

.card h3{
margin-bottom:10px;
color:#f5c84c;
}

.info{
color:#9ca3af;
margin-bottom:8px;
}

.price{
font-size:20px;
font-weight:bold;
color:#4cff8f;
margin-top:10px;
}

.btn{
margin-top:15px;
display:inline-block;
padding:10px 16px;
background:#f5c84c;
color:black;
border-radius:8px;
text-decoration:none;
font-weight:bold;
}

</style>

</head>

<body>


<div class="header">

<h2>Find Parking</h2>

</div>


<!-- search -->

<div class="search-box">

<input type="text" placeholder="Search parking near you...">

</div>


<!-- parking cards -->

<div class="parking-grid">

{% for p in parkings %}

<div class="card">

<h3>{{p.name}}</h3>

<div class="info">📍 {{p.location}}</div>

<div class="info">⭐ Rating : {{p.rating}}</div>

<div class="info">🅿 Available Slots : {{p.slots}}</div>

<div class="price">₹{{p.price}} / hr</div>

<a href="#" class="btn">Book Slot</a>

</div>

{% endfor %}

</div>


</body>
</html>
