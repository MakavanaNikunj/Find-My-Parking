{% load static %}
<!DOCTYPE html>
<html>
<head>
<title>Profile Settings</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600;700&family=Nunito:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>

body {
  background: #070d18;
  font-family: Segoe UI;
  color: white;
  padding: 40px;
  padding-top: 102px;
}

/* ── TOPBAR ── */
.topbar {
  position: fixed;
  top: 0; left: 0; right: 0;
  height: 62px;
  background: #0b1018;
  border-bottom: 1px solid rgba(196,160,50,0.09);
  display: flex;
  align-items: center;
  padding: 0 26px;
  gap: 14px;
  z-index: 100;
}

.hamburger {
  width: 38px; height: 38px;
  border-radius: 8px;
  border: 1px solid rgba(196,160,50,0.09);
  background: #161b25;
  color: #ddb94a;
  font-size: 18px;
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  transition: all .2s;
  flex-shrink: 0;
}
.hamburger:hover {
  border-color: rgba(196,160,50,0.32);
  background: #1c222e;
}

.search-wrap {
  display: flex; align-items: center; gap: 9px;
  background: #161b25;
  border: 1px solid rgba(196,160,50,0.09);
  border-radius: 10px;
  padding: 0 14px; height: 38px;
  flex: 1; max-width: 320px;
}
.search-wrap input[type="text"]:not([value]) {
  background: none; border: none; outline: none;
  color: #ddd4be; font-size: 13px;
  font-family: Segoe UI; width: 100%;
}
.search-wrap:focus-within { border-color: rgba(196,160,50,0.32); }

.tb-right {
  margin-left: auto;
  display: flex; align-items: center; gap: 10px;
}

.tb-welcome {
  font-size: 12.5px;
  color: #8695a6;
  background: #161b25;
  border: 1px solid rgba(196,160,50,0.09);
  padding: 6px 13px;
  border-radius: 8px;
}
.tb-welcome span { color: #ddb94a; font-weight: 600; }

.tb-icon {
  width: 36px; height: 36px;
  border-radius: 9px;
  background: #161b25;
  border: 1px solid rgba(196,160,50,0.09);
  display: grid; place-items: center;
  font-size: 15px; cursor: pointer;
  position: relative;
}

.tb-dot {
  width: 7px; height: 7px;
  background: #e07070;
  border-radius: 50%;
  position: absolute; top: 6px; right: 6px;
  border: 1.5px solid #0b1018;
}

/* ── PROFILE ── */
.tb-profile {
  display: flex; align-items: center; gap: 9px;
  background: #161b25;
  border: 1px solid rgba(196,160,50,0.09);
  padding: 6px 12px;
  border-radius: 10px;
  cursor: pointer;
  transition: all .2s;
}
.tb-profile:hover {
  border-color: rgba(196,160,50,0.32);
  background: #1c222e;
}
.tb-av {
  width: 30px; height: 30px;
  background: linear-gradient(135deg, #c4a032, #7a5c10);
  border-radius: 8px;
  display: grid; place-items: center;
  font-size: 13px; font-weight: 700;
  color: #eacf78; flex-shrink: 0;
}
.tb-profile-name {
  font-size: 13px; font-weight: 700;
  color: #ddd4be; display: block; line-height: 1.2;
}
.tb-profile-role { font-size: 10px; color: #58687a; }

/* ── PAGE SEARCH ── */
.page-search {
  display: flex; align-items: center; gap: 9px;
  background: #0b1220;
  border: 1px solid rgba(196,160,50,0.15);
  border-radius: 10px;
  padding: 0 14px; height: 38px;
  width: 260px;
  transition: border-color .2s;
}
.page-search:focus-within { border-color: rgba(196,160,50,0.40); }
.page-search input {
  background: none; border: none; outline: none;
  color: white; font-size: 13px;
  font-family: Segoe UI; width: 100%;
}
.page-search input::placeholder { color: #58687a; }

/* ── YOUR ORIGINAL CSS (unchanged) ── */

.header {
  display: flex;
  justify-content: flex-start;
  align-items: center;
  margin-bottom: 30px;
}

.header h2 { color: #f5c84c; }

.card {
  background: #0b1220;
  padding: 25px;
  border-radius: 14px;
  max-width: 600px;
}

.form-group { margin-bottom: 18px; }

label {
  display: block;
  margin-bottom: 6px;
  color: #9ca3af;
}

input {
  width: 100%;
  padding: 10px;
  border-radius: 8px;
  border: none;
  background: #070d18;
  color: white;
}

.btn {
  margin-top: 15px;
  padding: 10px 16px;
  background: #f5c84c;
  color: black;
  border: none;
  border-radius: 8px;
  font-weight: bold;
  cursor: pointer;
}

</style>
</head>

<body>

<!-- ── TOPBAR WITH HAMBURGER ── -->
<div class="topbar">
  <button id="menuToggle" class="hamburger" title="Open menu">☰</button>


  <div class="tb-right">
    <div class="tb-welcome">
      Welcome, <span>{{ request.user.email }}</span>
    </div>
    <div class="tb-icon">🔔<div class="tb-dot"></div></div>
    <div class="tb-profile">
      <div class="tb-av">
        {{ request.user.first_name|slice:":1"|upper }}{{ request.user.last_name|slice:":1"|upper }}
      </div>
      <div class="tb-profile-info">
        <span class="tb-profile-name">{{ request.user.get_full_name|default:request.user.email }}</span>
        <span class="tb-profile-role">User</span>
      </div>
    </div>
  </div>
</div>

<!-- ── SIDEBAR ── -->
{% include 'parking/user/usersidebar.html' %}

<!-- ── YOUR ORIGINAL PAGE CONTENT (unchanged) ── -->
<div class="header">
  <div style="display:flex; align-items:center; gap:16px;">
    <h2>Profile Settings</h2>
    <div class="page-search">
      <span style="color:#58687a;font-size:15px">⌕</span>
      <input type="text" placeholder="Search settings…">
    </div>
  </div>
</div>

<div class="card">
  <form>
    <div class="form-group">
      <label>Full Name</label>
      <input type="text" value="{{ user.name }}">
    </div>
    <div class="form-group">
      <label>Email</label>
      <input type="email" value="{{ user.email }}">
    </div>
    <div class="form-group">
      <label>Phone</label>
      <input type="text" value="{{ user.phone }}">
    </div>
    <div class="form-group">
      <label>Vehicle Number</label>
      <input type="text" value="{{ user.vehicle }}">
    </div>
    <button class="btn">Update Profile</button>
  </form>
</div>

</body>
</html>
